            background: #f3f3f4;

        }

        .assistant-message .message-content a {

            text-decoration: underline;
        }

        .assistant-message .message-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .thinking-content {
            color: #888;
        }

        .thinking-content .dot {
            display: inline-block;
            animation: thinkingDot 1.2s infinite;
        }

        .thinking-content .dot:nth-child(2) {
            animation-delay: .2s;
        }

        .thinking-content .dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes thinkingDot {
            0%, 60%, 100% {

                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-2px);

<body class="gray-bg">
    <div class="cloud-console-page">
        <div class="console-header">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    <h1><i class="fa fa-cloud"></i> ZDH 云服务控制台</h1>
                    <p class="text-muted">面向云服务运维、系统操作与故障排查的智能问答助手，聚合常见场景与平台能力，让问题定位更清晰、处理路径更高效。</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container">

                    </div>
                    <div class="ibox-content">
                        <div class="chat-box">
                            <div class="chat-messages" id="chatMessages" style="height: 500px; overflow-y: auto; margin-bottom: 20px; padding: 10px; border: 1px solid #e7eaec; border-radius: 5px;"></div>

                            <div class="chat-input">
                                <div class="input-group">
                                    <input type="text" id="questionInput" class="form-control" placeholder="请输入您的问题，例如：云服务任务失败如何排查？" onkeypress="handleKeyPress(event)">
                                    <span class="input-group-btn">
                                        <button class="btn btn-primary" type="button" onclick="askQuestion()">
                                            <i class="fa fa-paper-plane"></i> 发送
                                        </button>
                                        <button class="btn btn-default" type="button" onclick="clearChat()">
                                            <i class="fa fa-trash"></i> 清空
                                        </button>
                                    </span>
                                </div>
                                <small class="text-muted">推荐提问：云服务配置 / 系统操作 / 故障排查 / 任务诊断</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    </div>

    <!-- JavaScript -->
    <script src="js/zdh_common.js"></script>
    <script src="js/jquery.min.js?v=2.1.4"></script>
    <script src="js/bootstrap.min.js?v=3.3.6"></script>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }

        function askQuestion() {
            const question = $('#questionInput').val().trim();
            if (!question) {
                return;
            }

            // 添加用户问题到聊天窗口
            addMessage('user', question);
            $('#questionInput').val('');

            // 显示正在思考
            const thinkingId = addMessage('assistant', getThinkingHtml(), true);

            $.ajax({
                type: 'POST',
                url: server_context+"/cloud_question",
                dataType: 'json',
                data: {"question": question},
                //成功返回
                success: function (data) {
                    if(data.code != "200"){
                        const errorMsg = data.msg || '请求失败，请稍后重试';
                        updateMessage(errorMsg, thinkingId);
                        return ;
                    }
                    updateMessage(data.result, thinkingId);
                },
                //处理完成
                complete: function () {
                },
                //报错
                error: function (data) {
                    updateMessage('服务请求异常，请稍后重试', thinkingId);
                }
            });


            // 发送请求到后端
        }

        function addMessage(role, content, isThinking = false) {
            const messageDiv = $('<div>').addClass('message ' + role + '-message');
            if (isThinking) {
                messageDiv.attr('id', 'thinking-message-' + new Date().getTime() + '-' + Math.floor(Math.random() * 10000));
            }

            const avatar = $('<span>').addClass('avatar').html(
                role === 'user' ? '<i class="fa fa-user"></i>' : '<i class="fa fa-robot"></i>'
            );

            const contentDiv = $('<div>').addClass('message-content');
            renderMessageContent(contentDiv, role, content);

            messageDiv.append(avatar).append(contentDiv);
            $('#chatMessages').append(messageDiv);
            $('#chatMessages').scrollTop($('#chatMessages')[0].scrollHeight);
            return messageDiv.attr('id');
        }

        function updateMessage(content, messageId) {
            const messageSelector = messageId ? '#' + messageId : '[id^="thinking-message-"]:last';
            const contentDiv = $(messageSelector + ' .message-content');
            renderMessageContent(contentDiv, 'assistant', getAnswerContent(content));
            $(messageSelector).removeAttr('id');
        }

        function getThinkingHtml() {
            return '<span class="thinking-content">思考中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>';
        }

        function getAnswerContent(content) {
            if (content == null) {
                return '';
            }
            if (typeof content === 'object') {
                return content.answer || content.msg || JSON.stringify(content, null, 2);
            }
            return content;
        }

        function renderMessageContent(contentDiv, role, content) {
            if (role === 'assistant') {
                contentDiv.html(sanitizeHtml(formatAssistantContent(getAnswerContent(content))));
                contentDiv.find('a').attr('target', '_blank').attr('rel', 'noopener noreferrer');
                return;
            }
            contentDiv.text(content);
        }

        function formatAssistantContent(content) {
            const text = String(content || '');
            if (/<[a-z][\s\S]*>/i.test(text)) {
                return text;
            }
            return $('<div>').text(text).html().replace(/\n/g, '<br>');
        }

        function sanitizeHtml(html) {
            const allowedTags = ['A', 'B', 'STRONG', 'I', 'EM', 'U', 'BR', 'P', 'DIV', 'SPAN', 'UL', 'OL', 'LI', 'TABLE', 'THEAD', 'TBODY', 'TR', 'TH', 'TD', 'PRE', 'CODE', 'BLOCKQUOTE', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'IMG'];
            const allowedAttrs = {
                'A': ['href', 'title', 'target', 'rel'],
                'IMG': ['src', 'alt', 'title', 'width', 'height'],
                'TH': ['colspan', 'rowspan'],
                'TD': ['colspan', 'rowspan']
            };
            const template = document.createElement('template');
            template.innerHTML = html;

            $(template.content).find('*').each(function () {
                const tagName = this.tagName;
                if (allowedTags.indexOf(tagName) === -1) {
                    $(this).replaceWith(document.createTextNode($(this).text()));
                    return;
                }

                $.each(this.attributes, function () {
                    const attrName = this.name.toLowerCase();
                    const attrValue = this.value || '';
                    const tagAttrs = allowedAttrs[tagName] || [];
                    if (tagAttrs.indexOf(attrName) === -1 || /^on/i.test(attrName) || /javascript:/i.test(attrValue)) {
                        $(this.ownerElement).removeAttr(this.name);
                    }
                });
            });

            return template.innerHTML;
        }

        function clearChat() {
            $('#chatMessages').empty();
            // 添加欢迎消息
            addMessage('assistant', '您好！我是智能问答助手，我可以帮助您解答关于云服务平台的各种问题。请问您有什么需要帮助的吗？');
        }

        // 初始化聊天窗口
        $(document).ready(function() {
            clearChat(); // 初始化欢迎消息
        });
    </script>
</body>

</html>
