<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷统计分析</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/plugins/dataTables/dataTables.bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f3f3f4;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        .wrapper-content {
            padding: 20px;
        }

        .page-header {
            background: #fff;
            border-bottom: 1px solid #e7eaec;
            padding: 15px 20px;
            margin: -20px -20px 20px -20px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 24px;
            color: #676a6c;
        }

        .page-header small {
            font-size: 14px;
            color: #999;
            margin-left: 10px;
        }

        .ibox {
            background-color: #fff;
            border: 1px solid #e7eaec;
            margin-bottom: 20px;
            border-radius: 3px;
        }

        .ibox-title {
            background-color: #fff;
            border-top-left-radius: 3px;
            border-top-right-radius: 3px;
            color: inherit;
            border-bottom: 1px solid #e7eaec;
            padding: 15px 20px;
            min-height: 48px;
        }

        .ibox-title h5 {
            display: inline-block;
            font-size: 16px;
            margin: 0 0 7px;
            padding: 0;
            text-overflow: ellipsis;
            float: left;
            font-weight: bold;
        }

        .ibox-title .badge {
            float: right;
            background-color: #1ab394;
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 10px;
        }

        .ibox-content {
            padding: 20px;
            clear: both;
        }

        .stat-overview {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 25px;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .stat-card.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 36px;
            font-weight: bold;
        }

        .stat-card p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .question-stat {
            margin-bottom: 40px;
            padding: 25px;
            background: #fafafa;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e7eaec;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: #1ab394;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 15px;
            font-size: 16px;
        }

        .question-title-text {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .question-type-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: #edf2f7;
            color: #4a5568;
        }

        .question-type-badge.single { background: #ebf8ff; color: #2b6cb0; }
        .question-type-badge.multi { background: #fef3c7; color: #d97706; }
        .question-type-badge.text { background: #ede9fe; color: #7c3aed; }
        .question-type-badge.textarea { background: #fce7f3; color: #db2777; }
        .question-type-badge.score { background: #d1fae5; color: #059669; }
        .question-type-badge.date { background: #fee2e2; color: #dc2626; }
        .question-type-badge.select { background: #eff6ff; color: #2563eb; }
        .question-type-badge.number { background: #fdf4ff; color: #a21caf; }
        .question-type-badge.matrix_single { background: #f0fdf4; color: #15803d; }
        .question-type-badge.phone { background: #fff7ed; color: #c2410c; }

        .response-count {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .chart-container {
            width: 100%;
            height: 350px;
            margin: 20px 0;
            position: relative;
        }

        .text-response-list {
            max-height: 300px;
            overflow-y: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e7eaec;
        }

        .text-item {
            padding: 10px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-left: 4px solid #1ab394;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }

        .score-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .score-box {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .score-box:hover {
            transform: scale(1.05);
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #1ab394;
        }

        .score-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .number-stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .number-stat-item {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .number-stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .number-stat-label {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .matrix-table th,
        .matrix-table td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid #e7eaec;
        }

        .matrix-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .matrix-table td:first-child,
        .matrix-table th:first-child {
            font-weight: 600;
            background: #f8f9fa;
            text-align: left;
        }

        .matrix-cell {
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .matrix-cell:hover {
            background: #e8f4fd !important;
        }

        .matrix-cell .count {
            font-weight: bold;
            color: #1ab394;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1ab394;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #666;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .export-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #1ab394;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .export-btn:hover {
            background: #18a689;
        }

        @media (max-width: 768px) {
            .stat-overview {
                flex-direction: column;
            }

            .number-stats-summary {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-container {
                height: 280px;
            }
        }
    </style>
</head>
<body>

<div id="wrapper">

    <div class="page-wrapper">
        <div class="wrapper-content">

            <div class="page-header">
                <h2>问卷统计分析 <small id="surveyTitle"></small></h2>
                <div style="margin-top: 15px;">
                    <a href="javascript:history.back()" class="back-btn">
                        <i class="fa fa-arrow-left"></i> 返回列表
                    </a>
                    <button class="export-btn" onclick="exportStatistics()">
                        <i class="fa fa-download"></i> 导出报告
                    </button>
                </div>
            </div>

            <div id="loadingOverlay" class="loading-overlay">
                <div style="text-align: center;">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px; color: #666;">正在加载统计数据...</p>
                </div>
            </div>

            <div id="statisticsContent" style="display: none;">

                <div class="stat-overview">
                    <div class="stat-card">
                        <h3 id="totalResponses">0</h3>
                        <p><i class="fa fa-file-text-o"></i> 总提交数</p>
                    </div>
                    <div class="stat-card green">
                        <h3 id="uniqueUsers">0</h3>
                        <p><i class="fa fa-users"></i> 独立访客</p>
                    </div>
                    <div class="stat-card orange">
                        <h3 id="totalQuestions">0</h3>
                        <p><i class="fa fa-question-circle"></i> 题目总数</p>
                    </div>
                    <div class="stat-card blue">
                        <h3 id="avgResponseRate">0%</h3>
                        <p><i class="fa fa-line-chart"></i> 平均作答率</p>
                    </div>
                </div>

                <div id="questionsContainer"></div>

            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fa fa-bar-chart-o"></i>
                <h3>暂无统计数据</h3>
                <p>该问卷还没有收到任何提交，统计数据将在有用户提交后显示</p>
            </div>

        </div>
    </div>

</div>

<script src="js/jquery.min.js?v=2.1.4"></script>
<script src="js/bootstrap.min.js?v=3.3.6"></script>
<script src="js/plugins/echarts/echarts.min.js"></script>

<script>
    var server_context = '';
    var surveyId = '';
    var statisticsData = null;

    $(document).ready(function() {
        var urlParams = new URLSearchParams(window.location.search);
        surveyId = urlParams.get('id');

        if (!surveyId) {
            showError('缺少问卷ID参数');
            return;
        }

        loadStatistics();
    });

    function loadStatistics() {
        $.ajax({
            url: server_context + '/survey_statistics',
            type: 'POST',
            data: { survey_id: surveyId },
            dataType: 'json',
            success: function(response) {
                $('#loadingOverlay').hide();

                if (response.code === '200' && response.result) {
                    statisticsData = response.result;
                    renderStatistics(statisticsData);
                    $('#statisticsContent').show();
                } else {
                    $('#emptyState').show();
                }
            },
            error: function(xhr, status, error) {
                $('#loadingOverlay').hide();
                console.error('加载统计数据失败:', error);
                showError('加载统计数据失败: ' + error);
            }
        });
    }

    function renderStatistics(data) {
        document.title = '问卷统计 - ' + data.surveyTitle;

        $('#surveyTitle').text(data.surveyTitle);

        animateNumber('#totalResponses', data.totalResponses);
        animateNumber('#uniqueUsers', data.uniqueUsers);
        animateNumber('#totalQuestions', data.questions.length);

        var avgRate = data.totalResponses > 0 && data.questions.length > 0
            ? Math.round((data.uniqueUsers / data.questions.length) * 100)
            : 0;
        animateNumber('#avgResponseRate', avgRate, '%');

        renderQuestions(data.questions);
    }

    function animateNumber(selector, target, suffix) {
        suffix = suffix || '';
        var element = $(selector);
        var current = 0;
        var increment = target / 50;
        var timer = setInterval(function() {
            current += increment;
            if (current >= target) {
                current = target;
                clearInterval(timer);
            }
            element.text(Math.round(current) + suffix);
        }, 20);
    }

    function renderQuestions(questions) {
        var container = $('#questionsContainer');

        questions.forEach(function(question, index) {
            var questionHtml = buildQuestionHtml(question, index + 1);
            container.append(questionHtml);

            setTimeout(function() {
                renderQuestionChart(question, index);
            }, 100 * (index + 1));
        });
    }

    function buildQuestionHtml(question, number) {
        var typeLabels = {
            'single': '单选题',
            'multi': '多选题',
            'text': '单行文本',
            'textarea': '多行文本',
            'score': '评分题',
            'date': '日期题',
            'select': '下拉选择',
            'number': '数字输入',
            'matrix_single': '矩阵单选',
            'phone': '手机号码'
        };

        var html = '<div class="question-stat" id="question-' + question.questionId + '">' +
            '<div class="question-header">' +
                '<span class="question-number">' + number + '</span>' +
                '<span class="question-title-text">' + escapeHtml(question.questionTitle) + '</span>' +
                '<span class="question-type-badge ' + question.questionType + '">' +
                    (typeLabels[question.questionType] || question.questionType) +
                '</span>' +
                '<span class="response-count">' +
                    '<i class="fa fa-check-circle"></i> ' + question.responseCount + ' 人回答' +
                '</span>' +
            '</div>' +
            '<div class="chart-area" id="chart-' + question.questionId + '"></div>' +
        '</div>';

        return html;
    }

    function renderQuestionChart(question, index) {
        var chartArea = $('#chart-' + question.questionId);
        var type = question.questionType;

        if (['single', 'multi', 'select'].includes(type)) {
            renderOptionChart(chartArea, question);
        } else if (type === 'score') {
            renderScoreChart(chartArea, question);
        } else if (type === 'number') {
            renderNumberStats(chartArea, question);
        } else if (type === 'matrix_single') {
            renderMatrixTable(chartArea, question);
        } else {
            renderTextList(chartArea, question);
        }
    }

    function renderOptionChart(container, question) {
        var labels = [];
        var values = [];

        if (question.optionStats) {
            question.optionStats.forEach(function(item) {
                labels.push(item.label);
                values.push(item.value);
            });
        }

        container.append('<div class="chart-container" id="echart-' + question.questionId + '"></div>');

        var myChart = echarts.init(document.getElementById('echart-' + question.questionId));

        var option = {
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left',
                top: 'middle',
                textStyle: { fontSize: 13 }
            },
            series: [{
                name: question.questionTitle,
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}\n{c}人 ({d}%)',
                    fontSize: 12
                },
                emphasis: {
                    label: {
                        show: true,
                        fontSize: 14,
                        fontWeight: 'bold'
                    }
                },
                data: labels.map(function(label, i) {
                    return { value: values[i], name: label };
                })
            }],
            color: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452']
        };

        myChart.setOption(option);

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    }

    function renderScoreChart(container, question) {
        var distribution = question.scoreDistribution || {};
        var avgScore = question.averageScore || 0;

        var scoreLabels = ['1分', '2分', '3分', '4分', '5分'];
        var scoreValues = [distribution[1] || 0, distribution[2] || 0, distribution[3] || 0, distribution[4] || 0, distribution[5] || 0];

        var summaryHtml = '<div class="score-stats-grid">' +
            '<div class="score-box">' +
                '<div class="score-value">' + avgScore + '</div>' +
                '<div class="score-label">平均分</div>' +
            '</div>';
        
        for (var i = 1; i <= 5; i++) {
            summaryHtml += '<div class="score-box">' +
                '<div class="score-value">' + (distribution[i] || 0) + '</div>' +
                '<div class="score-label">' + i + '星</div>' +
            '</div>';
        }
        summaryHtml += '</div>';

        container.append(summaryHtml);
        container.append('<div class="chart-container" id="echart-' + question.questionId + '"></div>');

        var myChart = echarts.init(document.getElementById('echart-' + question.questionId));

        var option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: scoreLabels,
                axisLabel: { fontSize: 13 }
            },
            yAxis: {
                type: 'value',
                axisLabel: { fontSize: 13 }
            },
            series: [{
                name: '人数',
                type: 'bar',
                barWidth: '50%',
                data: scoreValues.map(function(val, idx) {
                    return {
                        value: val,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#83bff6' },
                                { offset: 0.5, color: '#188df0' },
                                { offset: 1, color: '#188df0' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        }
                    };
                }),
                label: {
                    show: true,
                    position: 'top',
                    fontSize: 12,
                    fontWeight: 'bold'
                }
            }]
        };

        myChart.setOption(option);

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    }

    function renderNumberStats(container, question) {
        if (!question.average) {
            container.append('<div class="empty-state"><p>暂无数据</p></div>');
            return;
        }

        var summaryHtml = '<div class="number-stats-summary">' +
            '<div class="number-stat-item">' +
                '<div class="number-stat-value">' + question.sum + '</div>' +
                '<div class="number-stat-label">总和</div>' +
            '</div>' +
            '<div class="number-stat-item">' +
                '<div class="number-stat-value">' + question.average + '</div>' +
                '<div class="number-stat-label">平均值</div>' +
            '</div>' +
            '<div class="number-stat-item">' +
                '<div class="number-stat-value">' + question.min + '</div>' +
                '<div class="number-stat-label">最小值</div>' +
            '</div>' +
            '<div class="number-stat-item">' +
                '<div class="number-stat-value">' + question.max + '</div>' +
                '<div class="number-stat-label">最大值</div>' +
            '</div>' +
        '</div>';

        container.append(summaryHtml);
    }

    function renderMatrixTable(container, question) {
        if (!question.matrixData || question.matrixData.length === 0) {
            container.append('<div class="empty-state"><p>暂无矩阵数据</p></div>');
            return;
        }

        var columns = question.columns || [];

        var tableHtml = '<table class="matrix-table"><thead><tr><th>问题项</th>';

        columns.forEach(function(col) {
            tableHtml += '<th>' + escapeHtml(col) + '</th>';
        });

        tableHtml += '</tr></thead><tbody>';

        question.matrixData.forEach(function(row) {
            tableHtml += '<tr><td><strong>' + escapeHtml(row.rowLabel) + '</strong></td>';

            columns.forEach(function(col) {
                var count = row.colStats[col] || 0;
                tableHtml += '<td class="matrix-cell"><span class="count">' + count + '</span></td>';
            });

            tableHtml += '</tr>';
        });

        tableHtml += '</tbody></table>';

        container.append(tableHtml);
    }

    function renderTextList(container, question) {
        var responseCount = question.responseCount || 0;

        var typeLabels = {
            'text': '单行文本',
            'textarea': '多行文本',
            'date': '日期',
            'phone': '手机号码'
        };

        var typeLabel = typeLabels[question.questionType] || '文本输入';

        var html = '<div style="text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white;">' +
            '<div style="font-size: 48px; font-weight: bold; margin-bottom: 10px;">' + responseCount + '</div>' +
            '<div style="font-size: 16px; opacity: 0.9;">人填写了此' + typeLabel + '题</div>' +
            '<div style="margin-top: 15px; font-size: 13px; opacity: 0.7;">' +
                '<i class="fa fa-info-circle"></i> 文本内容各不相同，仅统计作答数量' +
            '</div>' +
        '</div>';

        container.append(html);
    }

    function exportStatistics() {
        if (!statisticsData) {
            alert('没有可导出的数据');
            return;
        }

        var content = generateReportContent();
        downloadReport(content);
    }

    function generateReportContent() {
        var data = statisticsData;
        var report = '';

        report += '========================================\n';
        report += '           问卷统计分析报告\n';
        report += '========================================\n\n';

        report += '【问卷标题】' + data.surveyTitle + '\n';
        report += '【生成时间】' + new Date().toLocaleString() + '\n\n';

        report += '----------------------------------------\n';
        report += '              总体概览\n';
        report += '----------------------------------------\n';
        report += '总提交数：' + data.totalResponses + ' 次\n';
        report += '独立访客：' + data.uniqueUsers + ' 人\n';
        report += '题目总数：' + data.questions.length + ' 道\n\n';

        data.questions.forEach(function(q, index) {
            report += '----------------------------------------\n';
            report += '第 ' + (index + 1) + ' 题：' + q.questionTitle + '\n';
            report += '类型：' + q.questionType + '\n';
            report += '回答人数：' + q.responseCount + ' 人\n';

            if (q.optionStats) {
                report += '选项分布：\n';
                q.optionStats.forEach(function(opt) {
                    report += '  · ' + opt.label + '：' + opt.value + ' 人\n';
                });
            }

            if (q.averageScore !== undefined) {
                report += '平均分：' + q.averageScore + ' 分\n';
            }

            if (q.average !== undefined) {
                report += '数值统计：\n';
                report += '  · 总和：' + q.sum + '\n';
                report += '  · 平均值：' + q.average + '\n';
                report += '  · 最小值：' + q.min + '\n';
                report += '  · 最大值：' + q.max + '\n';
            }

            if (q.textResponses && q.textResponses.length > 0) {
                report += '文字回答（前10条）：\n';
                q.textResponses.slice(0, 10).forEach(function(text, idx) {
                    report += '  ' + (idx + 1) + '. ' + text + '\n';
                });
            }

            report += '\n';
        });

        report += '========================================\n';
        report += '             报告结束\n';
        report += '========================================\n';

        return report;
    }

    function downloadReport(content) {
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = '问卷统计报告_' + new Date().toISOString().slice(0, 10) + '.txt';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
        if (!text) return '';
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showError(message) {
        $('#loadingOverlay').hide();
        alert(message);
    }
</script>

</body>
</html>
