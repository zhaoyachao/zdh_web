<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDH 微信评论管理</title>
    <meta name="keywords" content="ZDH 微信评论管理">
    <meta name="description" content="ZDH 微信评论管理">

    <link rel="shortcut icon" href="img/favicon.ico">
    <link href="css/plugins/chosen/chosen.css" rel="stylesheet">
    <link href="css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="css/font-awesome.css?v=4.4.0" rel="stylesheet">
    <link href="css/plugins/bootstrap-table/bootstrap-table.min.css" rel="stylesheet">
    <link href="css/animate.css" rel="stylesheet">
    <link href="css/style.css?v=4.1.0" rel="stylesheet">
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="ibox float-e-margins">
        <div class="ibox-title">
            <h5>微信评论与回复管理</h5>
            <div class="ibox-tools">
                <a class="collapse-link"><i class="fa fa-chevron-up"></i></a>
            </div>
        </div>
        <div class="ibox-content">
            <form role="form" class="form-inline" id="wechat_comment_form">
                <div class="form-group">
                    <div class="input-group">
                        <input id="wechat_channel" name="wechat_channel" class="form-control" type="text" value="" placeholder="服务号">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <input id="article_id" name="article_id" class="form-control" type="text" value="" placeholder="文章ID">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <input id="context" name="context" class="form-control" type="text" value="" placeholder="关键字(内容/openid/comment_id)">
                    </div>
                </div>
                <div class="form-group">
                    <input id="search" type="button" class="btn btn-primary form-control" style="margin-bottom:0px" value="查询"/>
                </div>
            </form>

            <div class="row row-lg">
                <div class="col-sm-12">
                    <div class="example-wrap">
                        <div class="btn-group" id="exampleTableEventsToolbar" role="group">
                            <button id="sync" type="button" class="btn btn-outline btn-default" title="同步评论">
                                <i class="glyphicon glyphicon-refresh" aria-hidden="true"></i>
                            </button>
                            <button id="remove" type="button" class="btn btn-outline btn-default" title="批量删除">
                                <i class="glyphicon glyphicon-trash" aria-hidden="true"></i>
                            </button>
                        </div>
                        <table id="exampleTableEvents" data-height="500" data-mobile-responsive="true" data-content-type="application/x-www-form-urlencoded" data-query-params="queryParams"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/zdh_common.js"></script>
<script src="js/jquery.min.js?v=2.1.4"></script>
<script src="js/bootstrap.min.js?v=3.3.6"></script>
<script src="js/plugins/layer/layer.min.js"></script>
<script src="js/content.js?v=1.0.0"></script>
<script src="js/plugins/chosen/chosen.jquery.js"></script>
<script src="js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
<script src="js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
<script src="js/admin/dim_product_common.js"></script>
<script src="js/push/wechat_comment.js"></script>
<script>
    $(document).ready(function () {
        $('#search').click(function () {
            $('#exampleTableEvents').bootstrapTable('refresh', {
                url: server_context + "/wechat_comment_list_by_page?" + $("#wechat_comment_form").serialize(),
                contentType: "application/json;charset=utf-8",
                dataType: "json",
                queryParams: function (params) {
                    loadIndex = layer.load(1);
                    return {limit: params.limit, offset: params.offset};
                }
            });
        });
    });
</script>
</body>
</html>
