<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>微信授权页面</title>
    <meta name="keywords" content="微信授权">
    <meta name="description" content="微信授权跳转页面">

    <link rel="shortcut icon" href="../img/favicon.ico">
    <link href="../css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="../css/font-awesome.css?v=4.4.0" rel="stylesheet">
    <link href="../css/animate.css" rel="stylesheet">
    <link href="../css/style.css?v=4.1.0" rel="stylesheet">

</head>

<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5><i class="fa fa-wechat"></i> 微信授权跳转</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                    </div>
                </div>
                <div class="ibox-content">
                    <form role="form" id="wechat_auth_form" onsubmit='return false'>
                        <div class="form-group">
                            <label for="auth_url"><i class="fa fa-link"></i> 授权链接地址</label>
                            <input type="text" class="form-control" id="auth_url"
                                   placeholder="请输入微信授权链接地址...">
                        </div>

                        <div class="form-group">
                            <button type="button" class="btn btn-success btn-block btn-lg"
                                    onclick="bindAndRedirect()">
                                <i class="fa fa-arrow-right"></i> 绑定并跳转
                            </button>
                        </div>
                    </form>

                    <a id="auth_link" href="#" target="_blank" style="display: none;"></a>

                    <div class="alert alert-info" style="margin-top: 20px;">
                        <h4><i class="fa fa-info-circle"></i> 使用说明</h4>
                        <p style="margin-bottom: 0;">
                            1. 在上方输入框中输入微信授权链接地址<br>
                            2. 点击"绑定并跳转"按钮<br>
                            3. 系统将自动将链接绑定到跳转按钮并打开新窗口
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/jquery.min.js?v=2.1.4"></script>
<script src="../js/bootstrap.min.js?v=3.3.6"></script>
<script src="../js/content.js"></script>

<script>
    function getQueryParam(param) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function bindAndRedirect() {
        var url = $('#auth_url').val().trim();

        if (!url) {
            alert('请输入授权链接地址！');
            $('#auth_url').focus();
            return;
        }

        if (!isValidUrl(url)) {
            alert('请输入有效的URL地址！\n格式示例：https://open.weixin.qq.com/connect/qrconnect?...');
            $('#auth_url').focus();
            return;
        }

        $('#auth_link').attr('href', url);

        setTimeout(function() {
            window.open(url, '_blank');
        }, 100);
    }

    function isValidUrl(string) {
        try {
            new URL(string);
            return true;
        } catch (_) {
            return string.startsWith('http://') || string.startsWith('https://') || string.startsWith('/');
        }
    }

    $(document).ready(function() {
        var authUrlFromParam = getQueryParam('auth_url');

        if (authUrlFromParam) {
            $('#auth_url').val(decodeURIComponent(authUrlFromParam));

            setTimeout(function() {
                bindAndRedirect();
            }, 500);
        }

        $('#auth_url').keypress(function(e) {
            if (e.which == 13) {
                bindAndRedirect();
            }
        });
    });
</script>

</body>
</html>
